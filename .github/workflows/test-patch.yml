name: Test build

# Runs on every push / PR and on manual dispatch. Builds the image end-to-end
# to verify the proxy + ah4c + entrypoint layout still compiles and links.
# There is no patch applied to upstream source, so upstream drift cannot
# break this — but if we introduce a regression locally this catches it.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
