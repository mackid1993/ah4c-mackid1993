name: Sync submodule from sullrich/ah4c

# Runs daily on a schedule and can also be triggered manually. Advances
# the upstream/ submodule pointer to the latest sullrich/ah4c main, verifies
# patches/tune.patch still applies, and pushes. If the patch no longer
# applies, the workflow fails and GitHub emails you — time to update the
# patch. On success, run "Build and publish image" manually.
on:
  schedule:
    - cron: '0 13 * * *'  # 13:00 UTC daily
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream ref to pin (branch, tag, or SHA)"
        required: false
        default: "main"

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Advance submodule to upstream
        working-directory: upstream
        run: |
          ref="${{ inputs.upstream_ref || 'main' }}"
          git fetch origin "$ref"
          git checkout FETCH_HEAD
          echo "New upstream SHA: $(git rev-parse HEAD)"

      - name: Exit if nothing changed
        id: diff
        run: |
          if git diff --quiet upstream; then
            echo "No upstream change. Nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify patch still applies
        if: steps.diff.outputs.changed == 'true'
        working-directory: upstream
        run: git apply --check --verbose ../patches/tune.patch

      - name: Commit and push new submodule pointer
        if: steps.diff.outputs.changed == 'true'
        id: push
        run: |
          new_sha=$(git -C upstream rev-parse --short HEAD)
          full_sha=$(git -C upstream rev-parse HEAD)
          git add upstream
          git commit -m "Sync upstream submodule to sullrich/ah4c@${new_sha}"
          git push origin HEAD
          echo "short_sha=$new_sha" >> "$GITHUB_OUTPUT"
          echo "full_sha=$full_sha" >> "$GITHUB_OUTPUT"

      # Opening an issue triggers an email via GitHub's default notification
      # settings — that's how we get "notify on success" without changing
      # account-level notification preferences.
      - name: Open sync-notification issue
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Upstream synced to sullrich/ah4c@${{ steps.push.outputs.short_sha }} — run Build and Publish"
          body=$(cat <<EOF
          The daily sync-upstream workflow advanced the submodule and the patch still applies cleanly.

          - New pin: [\`${{ steps.push.outputs.short_sha }}\`](https://github.com/sullrich/ah4c/commit/${{ steps.push.outputs.full_sha }})
          - Upstream compare: https://github.com/sullrich/ah4c/compare/${{ steps.push.outputs.full_sha }}

          Next step: run the **Build and publish image** workflow manually to ship a new container.

          Close this issue once you've run the build.
          EOF
          )
          gh issue create --title "$title" --body "$body"
