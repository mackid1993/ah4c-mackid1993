name: Sync submodule from sullrich/ah4c

# Manual only. Bumps the upstream/ submodule pointer to the latest
# sullrich/ah4c main, verifies the patch still applies + builds, then pushes.
on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream ref to pin (branch, tag, or SHA)"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Advance submodule to upstream ${{ inputs.upstream_ref }}
        working-directory: upstream
        run: |
          git fetch origin "${{ inputs.upstream_ref }}"
          git checkout FETCH_HEAD
          echo "New upstream SHA: $(git rev-parse HEAD)"

      - name: Exit if nothing changed
        id: diff
        run: |
          if git diff --quiet upstream; then
            echo "No submodule change. Exiting."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run patch against new upstream
        if: steps.diff.outputs.changed == 'true'
        working-directory: upstream
        run: git apply --check --verbose ../patches/tune.patch

      - name: Set up Docker Buildx
        if: steps.diff.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Verify build
        if: steps.diff.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit and push new submodule pointer
        if: steps.diff.outputs.changed == 'true'
        run: |
          new_sha=$(git -C upstream rev-parse --short HEAD)
          git add upstream
          git commit -m "Sync upstream submodule to sullrich/ah4c@${new_sha}"
          git push origin HEAD
