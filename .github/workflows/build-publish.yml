name: Build and publish image

# Manual only. Click "Run workflow" to build linux/amd64 and push to GHCR.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (in addition to 'latest')"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          img="ghcr.io/${{ github.repository_owner }}/ah4c-mackid1993"
          out="${img}:latest"
          if [ -n "${{ inputs.tag }}" ]; then
            out="${out},${img}:${{ inputs.tag }}"
          fi
          echo "tags=${out}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
